<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chonk the Ansem Pet - Bull in a China Shop</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="blockScreen" style="display:none; position:fixed; inset:0; background:#120b06; color:#ffcf6a; align-items:center; justify-content:center; text-align:center; flex-direction:column; font-family:'Segoe UI',sans-serif; padding:20px; z-index:9999;">
  <div style="font-size:48px; margin-bottom:16px;">🐂</div>
  <div style="font-size:18px; font-weight:800; margin-bottom:8px;">Please open via Telegram</div>
  <div style="font-size:13px; opacity:0.8; max-width:280px;">This game only runs inside the Chonk Telegram Mini App.</div>
</div>

<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hud">
    <div id="hudRight">
      <div id="scoreBox">0</div>
    </div>
    <div id="best">BEST 0</div>
  </div>
  <div id="powerBar"><div id="powerFill"></div></div>
  <div id="msg">
    <div class="tapicon">🐂</div>
    <div class="big">Tap to Buck</div>
    <div class="small">Don't smash the china!</div>
  </div>

  <div id="walletScreen">
    <img class="logo" id="wsLogo" alt="Chonk logo">
    <h1>Chonk the Ansem Pet</h1>
    <div class="ticker">$CHONK</div>
    <div class="tagline">Airdrop? Maybe. Just keep playing.</div>
    <div id="streakBox" style="display:none; color:#ffcf6a; font-size:13px; font-weight:700; margin-bottom:8px; text-shadow:1px 1px 0 #000;"></div>
    <div class="formRow">
      <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
      <select id="countrySelect"></select>
    </div>
    <div id="welcomeBack" style="display:none; color:#ffcf6a; font-size:14px; font-weight:700; margin-bottom:10px; text-shadow:1px 1px 0 #000;"></div>
    <div class="actionRow">
      <button class="wsBtn secondary" id="startBtn">Start Game</button>
      <div class="actionRowInline">
        <button class="wsBtn" id="viewLeaderboardBtn" style="background:linear-gradient(180deg,#ffcf6a,#e08a2e);">🏆 Leaderboard</button>
        <button class="wsBtn" id="viewLoreBtn" style="background:linear-gradient(180deg,#c39bff,#7a4ae0);">📜 Lore</button>
        <button class="wsBtn walletBtn" id="connectWalletBtn" disabled>Connect Wallet<span class="soonTag">SOON</span></button>
      </div>
    </div>
  </div>

  <div id="lbModal">
    <div id="lbPanel">
      <h2>🏆 Top 100 Chonkers</h2>
      <ul id="lbFullList"><li class="empty">Loading...</li></ul>
      <div id="lbYouRow" style="display:none;"></div>
      <button class="wsBtn secondary" id="lbCloseBtn">Back</button>
    </div>
  </div>

  <div id="loreModal">
    <div id="lorePanel">
      <h2>Lore Chonk</h2>
      <div id="loreText"></div>
      <button class="wsBtn secondary" id="loreCloseBtn">Back</button>
    </div>
  </div>
</div>

<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/lore.js"></script>
<script src="js/streak.js"></script>
<script src="js/game.js"></script>
</body>
</html>
